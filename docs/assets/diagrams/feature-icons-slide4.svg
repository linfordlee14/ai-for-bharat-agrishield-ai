<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 340" width="1040" height="340">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1040" height="340" fill="#f8fafc"/>
  
  <!-- Card 1: Multi-Modal Detection -->
  <g transform="translate(20, 30)">
    <rect width="240" height="280" rx="16" fill="#ffffff" filter="url(#cardShadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Icon Container -->
    <rect x="80" y="32" width="80" height="80" rx="16" fill="url(#iconBg)"/>
    
    <!-- Camera Icon -->
    <g transform="translate(95, 52)" fill="none" stroke="#0284c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </g>
    
    <!-- Microphone Icon (overlapping) -->
    <g transform="translate(125, 68)" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </g>
    
    <!-- Text -->
    <text x="120" y="150" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Multi-Modal</text>
    <text x="120" y="172" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Detection</text>
    <text x="120" y="200" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="13" fill="#64748b">Camera + audio sensors</text>
    <text x="120" y="218" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="13" fill="#64748b">working together</text>
  </g>
  
  <!-- Card 2: Latency-Free Alerts -->
  <g transform="translate(284, 30)">
    <rect width="240" height="280" rx="16" fill="#ffffff" filter="url(#cardShadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Icon Container -->
    <rect x="80" y="32" width="80" height="80" rx="16" fill="url(#iconBg)"/>
    
    <!-- Phone Icon -->
    <g transform="translate(100, 48)" fill="none" stroke="#0284c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="2" width="14" height="20" rx="2"/>
      <line x1="12" y1="18" x2="12" y2="18"/>
    </g>
    
    <!-- Lightning Bolt -->
    <g transform="translate(128, 45)">
      <polygon points="13,2 3,14 12,14 11,22 21,10 12,10" fill="#38bdf8"/>
    </g>
    
    <!-- Notification lines -->
    <g stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round">
      <path d="M152 52 Q158 50 160 45" fill="none"/>
      <path d="M154 58 Q162 55 166 48" fill="none"/>
    </g>
    
    <!-- Text -->
    <text x="120" y="150" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Latency-Free</text>
    <text x="120" y="172" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Alerts</text>
    <text x="120" y="200" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="13" fill="#64748b">Instant SMS notifications</text>
    <text x="120" y="218" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="13" fill="#64748b">to rangers</text>
  </g>
  
  <!-- Card 3: Automated Deterrence -->
  <g transform="translate(548, 30)">
    <rect width="240" height="280" rx="16" fill="#ffffff" filter="url(#cardShadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Icon Container -->
    <rect x="80" y="32" width="80" height="80" rx="16" fill="url(#iconBg)"/>
    
    <!-- Light Bulb -->
    <g transform="translate(95, 50)" fill="none" stroke="#0284c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18h6"/>
      <path d="M10 22h4"/>
      <path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/>
    </g>
    
    <!-- Light rays -->
    <g stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round">
      <line x1="107" y1="45" x2="107" y2="40"/>
      <line x1="95" y1="52" x2="90" y2="48"/>
      <line x1="119" y1="52" x2="124" y2="48"/>
    </g>
    
    <!-- Sound Waves -->
    <g transform="translate(130, 58)" fill="none" stroke-linecap="round">
      <path d="M0 12 Q8 6 0 0" stroke="#0284c7" stroke-width="2"/>
      <path d="M8 15 Q20 7.5 8 0" stroke="#38bdf8" stroke-width="2"/>
      <path d="M16 18 Q32 9 16 0" stroke="#0284c7" stroke-width="2" opacity="0.6"/>
    </g>
    
    <!-- Text -->
    <text x="120" y="150" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Automated</text>
    <text x="120" y="172" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Deterrence</text>
    <text x="120" y="200" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="13" fill="#64748b">Light & sound to safely</text>
    <text x="120" y="218" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="13" fill="#64748b">repel wildlife</text>
  </g>
  
  <!-- Card 4: Ranger Dashboard -->
  <g transform="translate(812, 30)">
    <rect width="240" height="280" rx="16" fill="#ffffff" filter="url(#cardShadow)" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Icon Container -->
    <rect x="80" y="32" width="80" height="80" rx="16" fill="url(#iconBg)"/>
    
    <!-- Map Base -->
    <g transform="translate(92, 48)">
      <rect x="0" y="0" width="56" height="40" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
      
      <!-- Heat Points -->
      <circle cx="15" cy="12" r="6" fill="#0284c7" opacity="0.7"/>
      <circle cx="38" cy="18" r="8" fill="#38bdf8" opacity="0.6"/>
      <circle cx="25" cy="28" r="5" fill="#0284c7" opacity="0.5"/>
      <circle cx="45" cy="32" r="4" fill="#38bdf8" opacity="0.7"/>
      
      <!-- Pin Marker -->
      <g transform="translate(12, 20)">
        <path d="M6 0C2.7 0 0 2.7 0 6c0 4.5 6 10 6 10s6-5.5 6-10c0-3.3-2.7-6-6-6z" fill="#0284c7"/>
        <circle cx="6" cy="6" r="2" fill="#ffffff"/>
      </g>
    </g>
    
    <!-- Text -->
    <text x="120" y="150" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Ranger</text>
    <text x="120" y="172" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Dashboard</text>
    <text x="120" y="200" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="13" fill="#64748b">Real-time heatmaps &</text>
    <text x="120" y="218" text-anchor="middle" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="13" fill="#64748b">incident tracking</text>
  </g>
</svg>